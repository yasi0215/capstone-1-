<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - LottoGen</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1), 0 6px 6px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 480px;
            transition: background-color 0.3s;
        }

        .contact-container h1 {
            margin-bottom: 8px;
        }

        .contact-container p {
            color: var(--text-color);
            opacity: 0.7;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-group input,
        .form-group textarea {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: border-color 0.2s, background-color 0.3s;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .submit-btn:hover {
            background-color: #FF4747;
            box-shadow: 0 7px 14px rgba(0,0,0,0.1);
        }

        .success-msg {
            display: none;
            margin-top: 16px;
            padding: 12px;
            background-color: #d4edda;
            color: #155724;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="nav-logo">🎱 LottoGen</span>
        <div class="nav-links">
            <a href="index.html" class="nav-link">홈</a>
            <a href="contact.html" class="nav-link active">제휴 문의</a>
        </div>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </nav>

    <div class="contact-container">
        <h1>제휴 문의</h1>
        <p>광고, 파트너십, 기타 제휴 관련 문의를 남겨주세요.</p>

        <form id="contact-form" action="https://formspree.io/f/xpqoplkr" method="POST">
            <div class="form-group">
                <label for="name">이름 / 회사명</label>
                <input type="text" id="name" name="name" placeholder="홍길동 / (주)회사명" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="subject">문의 유형</label>
                <input type="text" id="subject" name="subject" placeholder="광고, 파트너십, 기타...">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" placeholder="문의 내용을 자세히 적어주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>

        <div class="success-msg" id="success-msg">
            문의가 성공적으로 접수되었습니다. 빠른 시일 내에 연락드리겠습니다!
        </div>
    </div>

    <script>
        // Theme toggle (shared logic)
        const toggle = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            toggle.textContent = '☀️ Light Mode';
        }
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            toggle.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Formspree AJAX submit
        const form = document.getElementById('contact-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const res = await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            if (res.ok) {
                form.reset();
                form.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            } else {
                alert('전송 중 오류가 발생했습니다. 다시 시도해주세요.');
            }
        });
    </script>
</body>
</html>
