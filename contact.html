<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <nav class="navbar">
        <span class="nav-logo">🎱 LottoGen</span>
        <div class="nav-links">
            <a href="index.html" class="nav-link">홈</a>
            <a href="contact.html" class="nav-link active">제휴 문의</a>
        </div>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </nav>

    <div class="contact-container">
        <h2>제휴 문의</h2>
        <p class="contact-desc">협업 및 제휴 관련 문의는 아래 양식을 이용해 주세요.</p>
        <form id="contact-form" action="https://formspree.io/f/xpqoplkr" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="company">회사명</label>
                <input type="text" id="company" name="company" placeholder="회사명을 입력하세요">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" placeholder="문의 내용을 입력하세요" required></textarea>
            </div>
            <button type="submit" id="submit-btn">문의 보내기</button>
            <p id="form-status"></p>
        </form>
    </div>

    <script src="contact.js"></script>
</body>
</html>
